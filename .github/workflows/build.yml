name: Build

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore solution
        run: dotnet restore .\F1Telemetry.sln --configfile .\NuGet.Config

      - name: Build solution
        run: dotnet build .\F1Telemetry.sln -c Release --no-restore --configfile .\NuGet.Config

      - name: Test solution
        run: dotnet test .\F1Telemetry.Tests\F1Telemetry.Tests.csproj -c Release --no-build
